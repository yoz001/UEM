<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mobile Site</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #e8e8e8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    .screen-content {
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 15px;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 900;
      color: #000;
      margin: 0;
      line-height: 1;
      letter-spacing: -1px;
    }

    .user-text {
      font-size: 2rem;
      font-weight: 600;
      color: #000;
      margin: 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .timestamp {
      font-size: 1.6rem;
      font-weight: 600;
      margin: 15px 0;
      line-height: 1.4;
      transition: color 0.3s ease;
    }

    .camera-icon {
      width: 150px;
      height: 150px;
      margin: 25px 0;
      flex-shrink: 0;
    }

    .version {
      font-size: 0.8rem;
      color: #888;
      margin-top: 15px;
    }

    .back-button {
      margin-top: 25px;
      padding: 10px 18px;
      background-color: #6b8e23;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background-color 0.3s;
    }

    .back-button:hover {
      background-color: #556b1f;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 3rem;
      }

      .user-text {
        font-size: 1.8rem;
      }

      .timestamp {
        font-size: 1.4rem;
      }

      .camera-icon {
        width: 130px;
        height: 130px;
      }
    }
  </style>
</head>
<body>
  <div class="screen-content">
    <h1>Thinking</h1>
    <div class="user-text" id="userMessage">Amazing Moment</div>
    <div class="timestamp" id="timestamp">
      <span id="dateDisplay">2026/07/10</span><br>
      <span id="timeDisplay">16:28:47</span>
    </div>
    
    <svg class="camera-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Camera body -->
      <rect x="45" y="65" width="110" height="75" rx="6" fill="#3a3a3a"/>
      
      <!-- Top white stripe -->
      <rect x="45" y="65" width="110" height="15" fill="#fff"/>
      
      <!-- Bottom white stripe -->
      <rect x="45" y="125" width="110" height="15" fill="#fff"/>
      
      <!-- Lens outer circle -->
      <circle cx="100" cy="102" r="28" fill="none" stroke="#fff" stroke-width="6"/>
      
      <!-- Lens inner circle -->
      <circle cx="100" cy="102" r="18" fill="#555" stroke="#999" stroke-width="2"/>
      
      <!-- Red prohibition circle and slash -->
      <circle cx="100" cy="100" r="88" fill="none" stroke="#ff0000" stroke-width="22" stroke-linecap="round"/>
      <line x1="35" y1="165" x2="165" y2="35" stroke="#ff0000" stroke-width="22" stroke-linecap="round"/>
    </svg>

    <div class="version">Ver.1.2.0_release</div>

    <button class="back-button" onclick="goBack()">← Back</button>
  </div>

  <script>
    // Get user message from session storage
    const userMessage = sessionStorage.getItem('userMessage');
    if (userMessage) {
      document.getElementById('userMessage').textContent = userMessage;
    }

    // Color array for timestamp
    const colors = ['#7cb342', '#d4af37', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];
    let colorIndex = 0;

    // Update date and time with changing color
    function updateDateTime() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('dateDisplay').textContent = `${year}/${month}/${day}`;
      document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;
      
      // Change color every second
      const timestampElement = document.getElementById('timestamp');
      timestampElement.style.color = colors[colorIndex];
      colorIndex = (colorIndex + 1) % colors.length;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);

    function goBack() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
