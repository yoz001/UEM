<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mobile Site</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #d3d3d3;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: 0;
    }

    .phone-screen {
      width: 320px;
      height: 640px;
      background-color: #e8e8e8;
      border-radius: 40px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 12px solid #1a1a1a;
      position: relative;
      overflow: hidden;
    }

    .phone-screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      background-color: #1a1a1a;
      border-radius: 0 0 30px 30px;
      z-index: 100;
    }

    .screen-content {
      width: 100%;
      height: 100%;
      background-color: #e8e8e8;
      border-radius: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 40px 20px;
      text-align: center;
    }

    .message-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 900;
      color: #000;
      margin: 0;
      line-height: 1;
      letter-spacing: -2px;
    }

    .user-text {
      font-size: 1.8rem;
      font-weight: 600;
      color: #000;
      margin: 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
      max-width: 280px;
    }

    .timestamp {
      font-size: 1.6rem;
      color: #7cb342;
      font-weight: 600;
      margin: 0;
      line-height: 1.3;
    }

    .camera-icon {
      width: 140px;
      height: 140px;
      margin: 20px 0;
      flex-shrink: 0;
    }

    .version {
      font-size: 0.75rem;
      color: #666;
      margin-top: 15px;
      text-align: right;
    }

    .back-button {
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding: 10px 15px;
      background-color: #6b8e23;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 10;
    }

    .back-button:hover {
      background-color: #556b1f;
    }
  </style>
</head>
<body>
  <div class="phone-screen">
    <div class="screen-content">
      <div class="message-container">
        <h1>Thinking</h1>
        <div class="user-text" id="userMessage">Her Chyn Yeow</div>
        <div class="timestamp" id="currentTime">
          <span id="dateDisplay">2026/07/10</span><br>
          <span id="timeDisplay">16:28:47</span>
        </div>
        
        <svg class="camera-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Camera body -->
          <rect x="45" y="65" width="110" height="75" rx="6" fill="#3a3a3a"/>
          
          <!-- Top white stripe -->
          <rect x="45" y="65" width="110" height="15" fill="#fff"/>
          
          <!-- Bottom white stripe -->
          <rect x="45" y="125" width="110" height="15" fill="#fff"/>
          
          <!-- Lens outer circle -->
          <circle cx="100" cy="102" r="28" fill="none" stroke="#fff" stroke-width="6"/>
          
          <!-- Lens inner circle -->
          <circle cx="100" cy="102" r="18" fill="#555" stroke="#999" stroke-width="2"/>
          
          <!-- Red prohibition circle and slash -->
          <circle cx="100" cy="100" r="88" fill="none" stroke="#ff0000" stroke-width="22" stroke-linecap="round"/>
          <line x1="35" y1="165" x2="165" y2="35" stroke="#ff0000" stroke-width="22" stroke-linecap="round"/>
        </svg>

        <div class="version">Ver.1.2.0_release</div>
      </div>
    </div>
  </div>

  <button class="back-button" onclick="goBack()">← Back</button>

  <script>
    // Get user message from session storage
    const userMessage = sessionStorage.getItem('userMessage');
    if (userMessage) {
      document.getElementById('userMessage').textContent = userMessage;
    }

    // Update date and time
    function updateDateTime() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('dateDisplay').textContent = `${year}/${month}/${day}`;
      document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);

    function goBack() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
