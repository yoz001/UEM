<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mobile Site</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: #f5f5f5;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 900;
      color: #000;
      margin-bottom: 30px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 2.5rem;
      font-weight: 700;
      color: #000;
      margin-bottom: 20px;
    }

    .timestamp {
      font-size: 2.2rem;
      color: #6b8e23;
      font-weight: 600;
      margin-bottom: 40px;
      line-height: 1.2;
    }

    .camera-icon-container {
      position: relative;
      display: inline-block;
      margin: 30px 0;
      width: 200px;
      height: 200px;
    }

    svg {
      width: 100%;
      height: 100%;;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    .version {
      font-size: 0.9rem;
      color: #666;
      margin-top: 40px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Thinking</h1>
    <div class="subtitle">Her Chyn Yeow</div>
    <div class="timestamp">
      2026/07/10<br>
      16:28:47
    </div>

    <div class="camera-icon-container">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Camera body -->
        <rect x="40" y="60" width="120" height="90" rx="8" fill="#3a3a3a" stroke="#fff" stroke-width="8"/>
        
        <!-- Top stripe -->
        <rect x="40" y="60" width="120" height="20" fill="#fff"/>
        
        <!-- Bottom stripe -->
        <rect x="40" y="130" width="120" height="20" fill="#fff"/>
        
        <!-- Lens circle -->
        <circle cx="100" cy="105" r="30" fill="none" stroke="#fff" stroke-width="8"/>
        <circle cx="100" cy="105" r="20" fill="#666" stroke="#fff" stroke-width="4"/>
        
        <!-- Red prohibition circle -->
        <circle cx="100" cy="100" r="90" fill="none" stroke="#ff0000" stroke-width="24"/>
        <line x1="40" y1="160" x2="160" y2="40" stroke="#ff0000" stroke-width="24" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="version">Ver.1.2.0_release</div>
  </div>
</body>
</html>
