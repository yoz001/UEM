<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mobile Site</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #e8e8e8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: 0;
      min-height: 100vh;
    }

    .screen-wrapper {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #e8e8e8;
      position: relative;
    }

    .screen-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      gap: 12px;
      position: relative;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 900;
      color: #000;
      margin: 0;
      line-height: 1;
      letter-spacing: -1px;
    }

    .user-text {
      font-size: 1.9rem;
      font-weight: 600;
      color: #000;
      margin: 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .timestamp {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 12px 0;
      line-height: 1.3;
      transition: color 0.3s ease;
    }

    .camera-icon {
      width: 130px;
      height: 130px;
      margin: 20px 0;
      flex-shrink: 0;
    }

    .version {
      position: absolute;
      bottom: 100px;
      right: 20px;
      font-size: 0.7rem;
      color: #888;
      text-align: right;
    }

    .bottom-nav {
      height: 80px;
      background-color: #e8e8e8;
      border-top: 1px solid #d0d0d0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: 10px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      color: #999;
      font-size: 0.8rem;
      transition: color 0.3s;
    }

    .nav-item:hover {
      color: #333;
    }

    .nav-item.active {
      color: #007AFF;
    }

    .nav-icon {
      font-size: 1.8rem;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-label {
      font-size: 0.75rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.8rem;
      }

      .user-text {
        font-size: 1.6rem;
      }

      .timestamp {
        font-size: 1.3rem;
      }

      .camera-icon {
        width: 110px;
        height: 110px;
      }

      .bottom-nav {
        height: 70px;
      }

      .nav-icon {
        font-size: 1.5rem;
      }

      .nav-label {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="screen-wrapper">
    <div class="screen-content">
      <h1>Thinking</h1>
      <div class="user-text" id="userMessage">Amazing Moment</div>
      <div class="timestamp" id="timestamp">
        <span id="dateDisplay">2026/07/10</span><br>
        <span id="timeDisplay">16:28:47</span>
      </div>
      
      <svg class="camera-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Camera body -->
        <rect x="45" y="65" width="110" height="75" rx="6" fill="#3a3a3a"/>
        
        <!-- Top white stripe -->
        <rect x="45" y="65" width="110" height="15" fill="#fff"/>
        
        <!-- Bottom white stripe -->
        <rect x="45" y="125" width="110" height="15" fill="#fff"/>
        
        <!-- Lens outer circle -->
        <circle cx="100" cy="102" r="28" fill="none" stroke="#fff" stroke-width="6"/>
        
        <!-- Lens inner circle -->
        <circle cx="100" cy="102" r="18" fill="#555" stroke="#999" stroke-width="2"/>
        
        <!-- Red prohibition circle and slash -->
        <circle cx="100" cy="100" r="88" fill="none" stroke="#ff0000" stroke-width="22" stroke-linecap="round"/>
        <line x1="35" y1="165" x2="165" y2="35" stroke="#ff0000" stroke-width="22" stroke-linecap="round"/>
      </svg>

      <div class="version">Ver.1.2.0_release</div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item">
        <div class="nav-icon">🏠</div>
        <div class="nav-label">Home</div>
      </div>
      <div class="nav-item active">
        <div class="nav-icon">📷</div>
        <div class="nav-label">Efence</div>
      </div>
      <div class="nav-item">
        <div class="nav-icon">⋯</div>
        <div class="nav-label">More</div>
      </div>
    </div>
  </div>

  <script>
    // Get user message from session storage
    const userMessage = sessionStorage.getItem('userMessage');
    if (userMessage) {
      document.getElementById('userMessage').textContent = userMessage;
    }

    // Color array for timestamp
    const colors = ['#7cb342', '#d4af37', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];
    let colorIndex = 0;

    // Update date and time with changing color
    function updateDateTime() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('dateDisplay').textContent = `${year}/${month}/${day}`;
      document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;
      
      // Change color every second
      const timestampElement = document.getElementById('timestamp');
      timestampElement.style.color = colors[colorIndex];
      colorIndex = (colorIndex + 1) % colors.length;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>
</body>
</html>
